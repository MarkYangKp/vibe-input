<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Input</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --accent: #007aff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --card: #ffffff;
        --text: #1d1d1f;
        --text-secondary: #86868b;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 360px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    h1 .brand {
      background: linear-gradient(135deg, var(--accent), #5ac8fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .qr-card {
      background: var(--card);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }

    .qr-code {
      margin: 0 auto 20px;
    }

    .qr-code img {
      width: 200px;
      height: 200px;
      display: block;
      margin: 0 auto;
    }

    .url {
      font-size: 14px;
      color: var(--text-secondary);
      word-break: break-all;
      padding: 12px;
      background: var(--bg);
      border-radius: 10px;
      font-family: "SF Mono", Monaco, monospace;
    }

    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .hint strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vibe <span class="brand">Input</span></h1>
    <p class="subtitle">用手机扫描二维码开始输入</p>

    <div class="qr-card">
      <div class="qr-code" id="qrcode"></div>
      <div class="url" id="url">loading...</div>
    </div>

    <p class="hint">
      <strong>使用方法：</strong><br>
      1. 确保手机和电脑在同一 WiFi 网络<br>
      2. 用手机浏览器扫描上方二维码<br>
      3. 在手机页面说话或输入文字<br>
      4. 文字会自动粘贴到电脑光标位置
    </p>
  </div>

  <script>
    // 获取当前页面 URL（去掉末尾斜杠），然后添加 /input 作为手机访问地址
    let baseUrl = window.location.href.replace(/\/$/, '');
    // 去掉末尾的 desktop.html 或其他路径，确保是基础 URL
    baseUrl = baseUrl.replace(/\/desktop\.html$/, '').replace(/\/input$/, '');
    const inputUrl = baseUrl + '/input';
    document.getElementById('url').textContent = inputUrl;

    // 从服务端获取二维码图片
    fetch('/api/qrcode')
      .then(res => res.blob())
      .then(blob => {
        const url = URL.createObjectURL(blob);
        const img = document.createElement('img');
        img.src = url;
        img.width = 200;
        img.height = 200;
        document.getElementById('qrcode').appendChild(img);
      })
      .catch(err => {
        console.error('二维码加载失败:', err);
        document.getElementById('qrcode').textContent = '加载失败';
      });
  </script>
</body>
</html>
