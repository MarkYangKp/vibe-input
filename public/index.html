<!DOCTYPE html>
<html lang="zh-CN" style="color-scheme: light dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <title>Vibe Input</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #f5f5f7;
      --bg-card: #ffffff;
      --bg-hover: #f0f0f2;
      --border-subtle: rgba(0, 0, 0, 0.06);
      --border-active: rgba(0, 122, 255, 0.3);
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #a1a1a6;
      --accent: #007aff;
      --accent-bg: rgba(0, 122, 255, 0.1);
      --success: #34c759;
      --success-bg: rgba(52, 199, 89, 0.15);
      --radius-lg: 20px;
      --radius-md: 14px;
      --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.06);
      --shadow-medium: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0a0a0a;
        --bg-card: #1c1c1e;
        --bg-hover: #2c2c2e;
        --border-subtle: rgba(255, 255, 255, 0.08);
        --border-active: rgba(0, 122, 255, 0.4);
        --text-primary: #f5f5f7;
        --text-secondary: #98989d;
        --text-tertiary: #6e6e73;
        --accent-bg: rgba(0, 122, 255, 0.2);
        --success-bg: rgba(52, 199, 89, 0.2);
        --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.3);
        --shadow-medium: 0 4px 20px rgba(0, 0, 0, 0.4);
      }
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: block;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding:
        env(safe-area-inset-top, 24px)
        env(safe-area-inset-right, 16px)
        env(safe-area-inset-bottom, 24px)
        env(safe-area-inset-left, 16px);
    }

    .header {
      text-align: center;
      padding-bottom: 24px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .header h1 .brand {
      background: linear-gradient(135deg, var(--accent), #5ac8fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 16px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .editor-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 200px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .editor-card:focus-within {
      border-color: var(--border-active);
      box-shadow: var(--shadow-medium);
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--success-bg);
      color: var(--success);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
    }

    .char-count {
      font-size: 13px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .editor-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      min-height: 0;
    }

    .editor-body textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 17px;
      line-height: 1.6;
      resize: none;
      -webkit-user-select: auto;
      user-select: auto;
      min-height: 80px;
    }

    .editor-body textarea:focus {
      outline: none;
    }

    .editor-body textarea::placeholder {
      color: var(--text-tertiary);
    }

    .tips-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .tip-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background-color 0.2s ease;
    }

    .tip-card:hover {
      background: var(--bg-hover);
    }

    .tip-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-bg);
      border-radius: 12px;
      flex-shrink: 0;
    }

    .tip-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--accent);
    }

    .tip-label {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .action-bar {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      border-radius: var(--radius-md);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      padding: 16px 24px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-clear {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
    }

    .btn-clear:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .btn-send {
      background: var(--text-primary);
      color: var(--bg-primary);
      box-shadow: var(--shadow-soft);
    }

    .btn-send:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-send:active:not(:disabled) {
      transform: scale(0.97) translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.4;
      cursor: default;
      transform: none;
    }

    .btn-send[data-state="success"] {
      background: var(--success);
      color: #fff;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(30, 30, 30, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text-primary);
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      box-shadow: var(--shadow-medium);
    }

    .toast[data-visible="true"] {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .page-wrapper {
        padding:
          calc(env(safe-area-inset-top, 0px) + 16px)
          16px
          calc(env(safe-area-inset-bottom, 0px) + 16px)
          16px;
      }

      .header {
        padding-bottom: 20px;
      }

      .header h1 {
        font-size: 28px;
      }

      .header p {
        font-size: 14px;
      }

      .main-content {
        gap: 12px;
      }

      .tips-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .tip-card {
        padding: 14px;
        flex-direction: column;
        text-align: center;
        gap: 8px;
      }

      .tip-icon {
        width: 36px;
        height: 36px;
      }

      .tip-icon svg {
        width: 18px;
        height: 18px;
      }

      .tip-label {
        font-size: 12px;
      }

      .action-bar {
        gap: 10px;
      }

      .btn {
        padding: 14px 20px;
        font-size: 16px;
      }
    }

    /* Landscape Mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .page-wrapper {
        padding: 12px 16px;
      }

      .header {
        padding-bottom: 10px;
      }

      .header h1 {
        font-size: 20px;
        margin-bottom: 2px;
      }

      .header p {
        font-size: 12px;
      }

      .tips-grid {
        display: none;
      }

      .editor-card {
        min-height: 100px;
      }

      .action-bar {
        margin-top: 8px;
      }

      .btn {
        padding: 10px 20px;
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <h1>Vibe <span class="brand">Input</span></h1>
      <p>语音输入，即刻同步</p>
    </header>

    <main class="main-content">
      <section class="editor-card">
        <div class="editor-toolbar">
          <span class="status-badge">已连接</span>
          <span class="char-count" id="charCount">0</span>
        </div>

        <div class="editor-body">
          <label class="sr-only" for="input">语音输入内容</label>
          <textarea
            id="input"
            name="voice-text"
            placeholder="在此输入或粘贴文字..."
            autocomplete="off"
            spellcheck="false"
            enterkeyhint="send"
          ></textarea>
        </div>
      </section>

      <div class="tips-grid">
        <div class="tip-card">
          <div class="tip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
          <span class="tip-label">语音输入<br>开始说话</span>
        </div>

        <div class="tip-card">
          <div class="tip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </div>
          <span class="tip-label">复制粘贴<br>同样支持</span>
        </div>
      </div>

      <div class="action-bar">
        <button type="button" class="btn btn-clear" id="clearBtn">清空</button>
        <button type="button" class="btn btn-send" id="sendBtn" disabled>发送到电脑</button>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const toastEl = document.getElementById('toast');
    const charCountEl = document.getElementById('charCount');

    let toastTimer = null;

    input.addEventListener('input', () => {
      const len = input.value.length;
      sendBtn.disabled = len === 0;
      charCountEl.textContent = len;
    });

    input.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        sendText();
      }
    });

    sendBtn.addEventListener('click', sendText);
    clearBtn.addEventListener('click', clearText);

    async function sendText() {
      const text = input.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      sendBtn.textContent = '发送中...';

      try {
        const res = await fetch('/api/type', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (data.ok) {
          sendBtn.dataset.state = 'success';
          sendBtn.textContent = '已发送';
          showToast('已上屏');

          setTimeout(() => {
            delete sendBtn.dataset.state;
            sendBtn.textContent = '发送到电脑';
            sendBtn.disabled = true;
            input.value = '';
            charCountEl.textContent = '0';
            input.focus();
          }, 600);
        } else {
          throw new Error();
        }
      } catch (err) {
        sendBtn.textContent = '发送到电脑';
        sendBtn.disabled = false;
        showToast('发送失败');
      }
    }

    function clearText() {
      input.value = '';
      sendBtn.disabled = true;
      charCountEl.textContent = '0';
      input.focus();
    }

    function showToast(msg) {
      if (toastTimer) clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.dataset.visible = 'true';
      toastTimer = setTimeout(() => {
        toastEl.dataset.visible = 'false';
      }, 1400);
    }
  </script>
</body>
</html>
